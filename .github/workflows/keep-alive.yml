name: Keep RedPen Awake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping deployed app to prevent Streamlit Cloud hibernation
        run: curl -fsS --max-time 30 https://redpen-by-hn.streamlit.app/ -o /dev/null
